<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G.EDU — Teacher Reading Correction Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════ */
:root {
  --cream:        #fdfcfb;
  --cream-deep:   #f5f2ed;
  --cream-border: #e8e2d9;
  --ink:          #1a1714;
  --ink-soft:     #4a4540;
  --ink-muted:    #8a8178;
  --gold:         #D4AF37;
  --gold-light:   #F0D060;
  --gold-pale:    #fdf6dc;
  --gold-border:  #e8c84a;
  --navy:         #1b2a4a;
  --navy-mid:     #253a63;
  --highlight:    #fff176;
  --highlight-bg: #fffde7;
  --success:      #2e7d32;
  --success-bg:   #f1f8e9;
  --evidence-bg:  #e8f4fd;
  --evidence-border: #90caf9;
  --shadow-sm:    0 1px 3px rgba(26,23,20,0.08);
  --shadow-md:    0 4px 16px rgba(26,23,20,0.10);
  --shadow-lg:    0 8px 32px rgba(26,23,20,0.13);
  --radius-sm:    6px;
  --radius-md:    12px;
  --radius-lg:    18px;
  --sidebar-w:    72px;
  --font-body:    'Be Vietnam Pro', sans-serif;
  --font-display: 'Playfair Display', Georgia, serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: var(--font-body);
  background: var(--cream);
  color: var(--ink);
  font-size: 14px;
  line-height: 1.6;
  overflow: hidden;
}

/* ═══════════════════════════════════════════
   LAYOUT SHELL
═══════════════════════════════════════════ */
#app {
  display: flex;
  height: 100vh;
  width: 100vw;
}

/* ── SIDEBAR ── */
#sidebar {
  width: 240px;
  min-width: 240px;
  background: var(--navy);
  display: flex;
  flex-direction: column;
  height: 100%;
  overflow: hidden;
  box-shadow: 2px 0 12px rgba(0,0,0,0.18);
  z-index: 10;
  flex-shrink: 0;
}

.sidebar-logo {
  padding: 22px 20px 16px;
  border-bottom: 1px solid rgba(212,175,55,0.25);
  flex-shrink: 0;
}

.logo-mark {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 0.04em;
}

.logo-sub {
  font-size: 9px;
  font-weight: 600;
  color: rgba(212,175,55,0.6);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-top: 2px;
}

.logo-test-name {
  margin-top: 10px;
  padding: 6px 10px;
  background: rgba(212,175,55,0.12);
  border: 1px solid rgba(212,175,55,0.35);
  border-radius: 6px;
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 700;
  font-style: italic;
  color: var(--gold-light);
  letter-spacing: 0.02em;
  text-align: center;
}

.sidebar-section {
  padding: 14px 16px 10px;
  flex-shrink: 0;
}

.sidebar-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  margin-bottom: 8px;
}

/* Passage selector */
.passage-tabs {
  display: flex;
  gap: 4px;
  padding: 12px 16px 0;
  flex-shrink: 0;
}

.passage-tab {
  flex: 1;
  padding: 7px 0;
  border: 1px solid rgba(212,175,55,0.3);
  background: transparent;
  color: rgba(255,255,255,0.55);
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 600;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.03em;
}

.passage-tab:hover {
  background: rgba(212,175,55,0.12);
  color: var(--gold-light);
  border-color: rgba(212,175,55,0.5);
}

.passage-tab.active {
  background: var(--gold);
  border-color: var(--gold);
  color: var(--navy);
  font-weight: 700;
  box-shadow: 0 2px 8px rgba(212,175,55,0.35);
}

/* Question map */
.q-map-wrap {
  flex: 1;
  overflow-y: auto;
  padding: 10px 16px 12px;
  scrollbar-width: thin;
  scrollbar-color: rgba(212,175,55,0.2) transparent;
}

.q-map-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 4px;
}

.q-chip {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 600;
  border-radius: 5px;
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.5);
  cursor: pointer;
  border: 1px solid transparent;
  transition: all 0.15s;
}

.q-chip:hover {
  background: rgba(212,175,55,0.15);
  color: var(--gold-light);
  border-color: rgba(212,175,55,0.3);
}

.q-chip.answered {
  background: rgba(212,175,55,0.18);
  color: var(--gold-light);
  border-color: rgba(212,175,55,0.35);
}

.q-chip.checked {
  background: rgba(46,125,50,0.25);
  color: #a5d6a7;
  border-color: rgba(46,125,50,0.4);
}

/* Sidebar actions */
.sidebar-actions {
  padding: 12px 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 7px;
  flex-shrink: 0;
  border-top: 1px solid rgba(212,175,55,0.15);
}

.btn-sidebar {
  width: 100%;
  padding: 9px 14px;
  border-radius: var(--radius-sm);
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.04em;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  border: 1px solid;
}

.btn-show-keys {
  background: var(--gold);
  color: var(--navy);
  border-color: var(--gold);
}

.btn-show-keys:hover {
  background: var(--gold-light);
  box-shadow: 0 3px 12px rgba(212,175,55,0.4);
}

.btn-clear-hl {
  background: transparent;
  color: rgba(255,255,255,0.55);
  border-color: rgba(255,255,255,0.2);
}

.btn-clear-hl:hover {
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.85);
  border-color: rgba(255,255,255,0.35);
}

/* ── MAIN CONTENT ── */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100%;
  overflow: hidden;
  min-width: 0;
}

/* Top bar */
#topbar {
  height: 52px;
  min-height: 52px;
  background: var(--cream);
  border-bottom: 1px solid var(--cream-border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  flex-shrink: 0;
}

.topbar-title {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 600;
  color: var(--navy);
  font-style: italic;
}

.topbar-meta {
  font-size: 11px;
  color: var(--ink-muted);
  font-weight: 500;
}

.topbar-passage-badge {
  margin-left: auto;
  background: var(--gold-pale);
  border: 1px solid var(--gold-border);
  color: #8a6b00;
  font-size: 11px;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 20px;
  letter-spacing: 0.05em;
}

/* Split pane */
#split-container {
  flex: 1;
  display: flex;
  overflow: hidden;
  min-height: 0;
}

/* Left: Passage */
#passage-pane {
  width: 50%;
  min-width: 280px;
  overflow-y: auto;
  padding: 24px 28px;
  background: var(--cream);
  position: relative;
  scrollbar-width: thin;
  scrollbar-color: var(--cream-border) transparent;
}

/* Splitter */
#splitter {
  width: 5px;
  background: var(--cream-border);
  cursor: col-resize;
  flex-shrink: 0;
  position: relative;
  transition: background 0.2s;
  user-select: none;
}

#splitter:hover, #splitter.dragging {
  background: var(--gold);
}

#splitter::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 3px;
  height: 40px;
  background: rgba(212,175,55,0.5);
  border-radius: 4px;
}

/* Right: Questions */
#questions-pane {
  flex: 1;
  overflow-y: auto;
  padding: 24px 28px;
  background: var(--cream-deep);
  min-width: 280px;
  scrollbar-width: thin;
  scrollbar-color: var(--cream-border) transparent;
}

/* ═══════════════════════════════════════════
   PASSAGE STYLES
═══════════════════════════════════════════ */
.passage-header {
  margin-bottom: 20px;
}

.passage-eyebrow {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 6px;
}

.passage-title {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 700;
  color: var(--navy);
  line-height: 1.3;
  margin-bottom: 4px;
}

.passage-source {
  font-size: 11px;
  color: var(--ink-muted);
  font-style: italic;
}

.passage-divider {
  width: 48px;
  height: 2px;
  background: var(--gold);
  margin: 14px 0;
  border-radius: 2px;
}

.passage-body {
  font-size: 14px;
  line-height: 1.85;
  color: var(--ink);
  user-select: text;
}

.passage-body p {
  margin-bottom: 14px;
}

.passage-body .para-label {
  font-weight: 700;
  color: var(--navy);
  font-size: 12px;
}

mark.hl-yellow {
  background: var(--highlight);
  border-radius: 2px;
  padding: 0 1px;
  cursor: pointer;
  transition: background 0.15s;
}

mark.hl-yellow:hover {
  background: #ffee33;
  text-decoration: line-through;
  text-decoration-color: rgba(0,0,0,0.3);
}

/* Highlight toolbar */
#hl-toolbar {
  position: fixed;
  display: none;
  background: var(--navy);
  border-radius: 20px;
  padding: 5px 8px;
  gap: 4px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.28);
  z-index: 2000;
  align-items: center;
  pointer-events: auto;
  transform: translateX(-50%);
}

#hl-toolbar.visible {
  display: flex;
}

/* small arrow under toolbar */
#hl-toolbar::after {
  content: '';
  position: absolute;
  top: 100%;
  left: 50%;
  transform: translateX(-50%);
  border: 5px solid transparent;
  border-top-color: var(--navy);
}

.hl-btn {
  padding: 5px 14px;
  background: var(--gold);
  color: var(--navy);
  border: none;
  border-radius: 14px;
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: all 0.15s;
  white-space: nowrap;
}

.hl-btn:hover { background: var(--gold-light); }

/* ═══════════════════════════════════════════
   QUESTION GROUP STYLES
═══════════════════════════════════════════ */
.q-group {
  margin-bottom: 28px;
}

.q-group-header {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--cream-border);
}

.q-group-num {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--gold);
}

.q-group-instruction {
  font-size: 12px;
  color: var(--ink-soft);
  line-height: 1.5;
  background: rgba(212,175,55,0.07);
  border-left: 3px solid var(--gold);
  padding: 8px 12px;
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  margin-bottom: 14px;
}

/* Individual question card */
.q-card {
  background: var(--cream);
  border: 1px solid var(--cream-border);
  border-radius: var(--radius-md);
  padding: 14px 16px;
  margin-bottom: 10px;
  box-shadow: var(--shadow-sm);
  transition: box-shadow 0.2s;
}

.q-card:hover {
  box-shadow: var(--shadow-md);
}

.q-card-top {
  display: flex;
  align-items: flex-start;
  gap: 10px;
}

.q-num-badge {
  min-width: 26px;
  height: 26px;
  background: var(--navy);
  color: var(--gold);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  flex-shrink: 0;
  margin-top: 1px;
}

.q-content {
  flex: 1;
}

.q-stem {
  font-size: 13px;
  color: var(--ink);
  line-height: 1.5;
  margin-bottom: 8px;
}

/* MCQ options */
.q-options {
  display: flex;
  flex-direction: column;
  gap: 5px;
  margin-bottom: 8px;
}

.q-option {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 10px;
  background: var(--cream-deep);
  border: 1px solid var(--cream-border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.15s;
  font-size: 12px;
}

.q-option:hover {
  background: var(--gold-pale);
  border-color: var(--gold-border);
}

.q-option.selected {
  background: var(--gold-pale);
  border-color: var(--gold);
}

.opt-letter {
  width: 20px;
  height: 20px;
  background: white;
  border: 1px solid var(--cream-border);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  color: var(--ink-muted);
  flex-shrink: 0;
}

.q-option.selected .opt-letter {
  background: var(--gold);
  border-color: var(--gold);
  color: white;
}

/* Teacher answer input */
.teacher-input-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

.teacher-input {
  flex: 1;
  padding: 7px 12px;
  background: white;
  border: 1px solid var(--cream-border);
  border-radius: var(--radius-sm);
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--ink);
  outline: none;
  transition: border 0.15s;
}

.teacher-input:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(212,175,55,0.12);
}

.btn-check {
  padding: 7px 16px;
  background: var(--navy);
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  cursor: pointer;
  transition: all 0.18s;
  white-space: nowrap;
}

.btn-check:hover {
  background: var(--navy-mid);
  box-shadow: 0 3px 10px rgba(27,42,74,0.3);
}


/* Completion and guided-answer layouts */
.cloze-sheet {
  background: #fff;
  border: 1px solid var(--cream-border);
  border-radius: var(--radius-md);
  padding: 18px 20px;
  margin-bottom: 10px;
  box-shadow: var(--shadow-sm);
}
.cloze-section { margin: 0 0 16px; }
.cloze-section:last-of-type { margin-bottom: 10px; }
.cloze-heading {
  font-family: var(--font-display);
  font-size: 15px;
  font-style: italic;
  color: var(--navy);
  margin-bottom: 6px;
}
.cloze-row {
  font-size: 13px;
  color: var(--ink);
  line-height: 1.65;
  padding-left: 14px;
  position: relative;
}
.cloze-row::before { content: '•'; position: absolute; left: 0; color: var(--gold); }
.cloze-number { font-weight: 700; color: var(--navy); margin-right: 4px; }
.cloze-input {
  width: 126px;
  min-width: 78px;
  border: 0;
  border-bottom: 2px solid var(--gold);
  background: var(--gold-pale);
  border-radius: 4px 4px 0 0;
  padding: 3px 7px;
  font: inherit;
  color: var(--ink);
  outline: none;
  vertical-align: baseline;
}
.cloze-input:focus { box-shadow: 0 2px 0 var(--navy); }
.cloze-input.is-correct {
  border-bottom-color: #2e7d32;
  background: #edf7ed;
  box-shadow: inset 0 0 0 1px rgba(46,125,50,.15);
}
.cloze-input.is-wrong {
  border-bottom-color: #c62828;
  background: #fff1f1;
  box-shadow: inset 0 0 0 1px rgba(198,40,40,.15);
}
.cloze-sentence { padding: 8px 0; font-size: 13px; line-height: 1.7; border-bottom: 1px solid var(--cream-border); }
.cloze-sentence:last-of-type { border-bottom: 0; }
.cloze-sentence .cloze-input { width: 118px; }
.inline-cloze { display: inline-flex; align-items: center; gap: 6px; vertical-align: baseline; }
.inline-cloze-num { font-size: 11px; font-weight: 700; color: var(--ink-muted); }
.group-check-row { display: flex; justify-content: flex-end; margin-top: 12px; }
.completion-review {
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--cream-border);
}
.completion-review-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin-bottom: 10px;
}
.completion-chip-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 12px;
}
.completion-chip {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 1px solid var(--cream-border);
  background: #fff;
  color: var(--navy);
  font: 700 13px var(--font-body);
  cursor: pointer;
  transition: all .15s;
}
.completion-chip:hover,
.completion-chip.active {
  background: var(--gold-pale);
  border-color: var(--gold);
}
.completion-chip.checked {
  box-shadow: inset 0 0 0 2px rgba(212,175,55,.25);
}
.completion-panel-stack .correction-panel {
  margin-top: 0;
}
.option-directory {
  display: flex;
  flex-wrap: wrap;
  gap: 6px 10px;
  padding: 10px 12px;
  margin: 0 0 12px;
  background: var(--cream-deep);
  border: 1px solid var(--cream-border);
  border-radius: var(--radius-sm);
  font-size: 11px;
  color: var(--ink-soft);
}
.option-directory span { white-space: nowrap; }
.option-directory b { color: var(--navy); margin-right: 3px; }
.answer-dropdown {
  width: 100%;
  max-width: 410px;
  padding: 8px 10px;
  margin: 2px 0 8px;
  background: #fff;
  border: 1px solid var(--gold-border);
  border-radius: var(--radius-sm);
  color: var(--ink);
  font: 12px var(--font-body);
  outline: none;
}
.answer-dropdown:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(212,175,55,.12); }
.binary-choices { display: flex; gap: 7px; flex-wrap: wrap; margin: 4px 0 8px; }
.binary-choice {
  padding: 7px 10px;
  background: #fff;
  border: 1px solid var(--cream-border);
  border-radius: var(--radius-sm);
  color: var(--ink-soft);
  font: 700 10px var(--font-body);
  letter-spacing: .04em;
  cursor: pointer;
}
.binary-choice:hover, .binary-choice.selected { background: var(--gold-pale); border-color: var(--gold); color: var(--navy); }
@media (max-width: 600px) { .cloze-sheet { padding: 14px; } .cloze-input { width: 96px; } .option-directory { display: block; } .option-directory span { display: inline-block; margin: 0 10px 5px 0; } }

/* Correction panel */
.correction-panel {
  display: none;
  margin-top: 10px;
  border-top: 1px dashed var(--cream-border);
  padding-top: 10px;
  flex-direction: column;
  gap: 8px;
}

.correction-panel.open { display: flex; }

.correct-row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  font-size: 12px;
}

.correct-row.key-row {
  background: var(--success-bg);
  border: 1px solid #c8e6c9;
}

.correct-row.explain-row {
  background: #fff8e1;
  border: 1px solid #ffe082;
}

.correct-row.evidence-row {
  background: var(--evidence-bg);
  border: 1px solid var(--evidence-border);
  padding: 0;
  overflow: hidden;
}

.evidence-row-inner {
  display: flex;
  flex-direction: column;
  width: 100%;
}

.evidence-top {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 8px 12px 6px;
}

.btn-view-evidence {
  width: 100%;
  padding: 7px 12px;
  background: rgba(144,202,249,0.18);
  border: none;
  border-top: 1px solid var(--evidence-border);
  color: #1565c0;
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.04em;
  cursor: pointer;
  text-align: left;
  transition: all 0.15s;
}

.btn-view-evidence:hover {
  background: rgba(144,202,249,0.35);
  color: #0d47a1;
}

    {
      "id": 1,
      "title": "Public art programs: research update",
      "source": "IELTS Academic Reading Practice",
      "qRange": [

        26
      ],
      "paragraphs": [
        {
          "label": "",
          "text": "Researchers agree that art participation is an important leisure pursuit, with benefits not only to the individual, but also to the community. Art participation can be active, where people create or perform the art, or passive, as is the case when an audience views a performance or a person visits a gallery."
        },
        {
          "label": "A",
          "text": "Researcher Howard Spector suggests that active art experiences benefit all age groups by providing individuals with the means to freely and creatively express themselves. Self-expression, in turn, promotes individuality, bolsters self-confidence and improves motivation and attitudes towards academic performance. Both active and passive art experiences can provide the benefits of discovery, stimulation and relaxation (Oliphant 2000). Furthermore, people’s participation in art enhances their development and expands their thoughts about culture. In short, art can make individuals more socially conscious."
        },
        {
          "label": "B",
          "text": "Communities committed to providing opportunities for experiencing art are considered more livable because they are attractive to businesses and industry and they offer a higher quality of life for residents (Riley 2002). Tourism is strongly linked to art; art is believed to stimulate tourism in a community, and vice versa. Art-related tourism generates tourists and revenue, attracts high-income consumers, extends the tourist season and is a \"green\" form of the industry (Hughes 2000). Revitalization efforts have increased in many cities because of the strong presence of art opportunities. Art programs can be highly effective in reducing community problems related to delinquent behavior and truancy in youth (Spector 2000). The Philadelphia Department of Recreation Mural Arts Program (MAP) is one such program. It began in the early 1980s when the city undertook to remove graffiti in the city while creating a positive, productive and creative outlet for adjudicated graffiti artists, as they used their talents to beautify public spaces through the creation of murals, instilling a sense of pride, excellence, diligence and civic responsibility."
        },
        {
          "label": "C",
          "text": "In recognition of these and other benefits, communities are finding many ways to ensure that the public is provided with opportunities to experience art. Public art programs are one way. These programs are typically administered by government, which commissions or mandates works of art for display in public spaces. Public art works can include street furniture, decorations, paving and landmarks, and may take on many forms, including sculpture, decorative ironwork, mosaic flooring and murals. The primary purpose of public art is to bring art into everyday life, to energize public spaces and to arouse society's thinking and imagination."
        },
        {
          "label": "D",
          "text": "Despite the significant benefits that art participation can offer to individuals and communities, only 35 percent of the American adult population visit museums or galleries at least once during the year, and only about 25 percent attend a live performance (Bradshaw 1998). Even fewer (14 percent) participate directly in photography, painting, drawing, sculpting, dance (other than ballet), creative writing or classical music. If art experiences are so beneficial, why aren't more people participating? To help researchers shed light on this question, the RAND Corporation, a nonprofit institution that helps improve policy and decision-making through objective research and analysis, developed \"A Behavior Model of the Participant Decision\", which can be used to investigate people's inclinations about participating in an art activity (Yoshitomi 2000). According to Yoshitomi, each person has a disposition related to his or her interest in engaging in an art activity; a person's disposition is based on sociodemographic characteristics, social or cultural identity, personality and previous experience. The RAND model clusters participants into three groups according to their disposition toward art participation: those disinclined to participate; those inclined to participate; and those currently participating."
        },
        {
          "label": "E",
          "text": "The RAND findings reveal that the disinclined perceive themselves as being uncomfortable or unfamiliar with art. This disposition might occur among people who do not value art and who have not received art education, or who perceive themselves as unsophisticated or lacking skill to participate. The inclined are interested in participating, but may be constrained by particular barriers such as cost, time, and proper attire. Current participants are those who are involved, and influence or encourage others to participate. Researchers suggest that a strong relationship exists between childhood and adult art participation rates. Individuals with a greater number of childhood art experiences are more likely to have higher rates of participation as adults. Although 90 percent of Americans believe art instruction is important for children and should be offered in schools, almost 40 percent of schools either offer no art instruction or have art instructors with no formal art training."
        },
        {
          "label": "F",
          "text": "One recreation organization working to make sure children get exposed to art is the Boys and Girls Clubs of America, which offer two innovative programs: The National Photography Program and the National Fine Arts Exhibit. Both are designed to get children excited about art. The photography program promotes new art that is technologically produced, including video and computer graphics, but primarily focuses on photography. The program provides club members with the opportunity to achieve personal growth and receive artistic recognition through instruction in photography. Participants also display their work at local, regional and national photography contests. The second program is the Fine Arts Exhibit. This encourages artistic expression, creativity, cultural appreciation and the development of artistic skills through classes, special events, exhibits and competitions. It allows participants to explore a variety of mediums, including drawing, painting, print making, collage and sculpture."
        },
        {
          "label": "",
          "text": "Because art experiences provide so many important benefits to individuals and communities, it is important for community programs to facilitate opportunities and provide encouragement to increase participation in a variety of programs."
        }
      ]

      "id": 2,
      "title": "200 Years of Australian Landscapes at the Royal Academy in London",
      "source": "IELTS Academic Reading Practice",
      "qRange": [

        40
      ],
      "paragraphs": [
        {
          "label": "A",
          "text": "For the casual viewer, the exhibition of landscapes, Australia, selected by the Royal Academy of Art will be a spectacular guide through Australian art history. Included in the exhibition are a range of artists and styles, dating from the earliest days of colonial art and progressing through expressionism and modernism to the artists of the 20th century, culminating with the current generation of Australian artists. It is hardly surprising, then, that this results in a flexible, wide-ranging notion of landscape."
        },
        {
          "label": "B",
          "text": "But this landmark exhibition gives rise to some questions, and perhaps problems, regarding Britain’s relationship with its former colony. By choosing a style of painting at which British artists excel, the Academy could be seen as inviting criticism that hints at a telling attitude towards art by comparison. But it is the very theme of landscape painting that makes this a controversial selection. To consider if condescending is perhaps too strong, but for Joanna Mendelssohn, Australian critic and Associate Professor at the University of NSW’s College of Fine Arts (COFA), there is a suggestion that British artistic values have directed this exhibition, rather than allowing Australia the freedom to demonstrate its maturity."
        },
        {
          "label": "C",
          "text": "What Mendelssohn found surprising about the exhibition was the underlying rules for the selection of works seemed to have been so conservative. Since the landscape is a very strong British artistic theme, it appeared to her that when the British looked to the art of a former colony, there was a tendency for them to think that those colonies would continue to be like the British themselves. In reviewing Australian art, the British insisted on looking at the genre of landscape painting."
        },
        {
          "label": "D",
          "text": "Because of colonial ties, it was inevitable during Australian art’s formative years that it would reflect Britain’s devotion to the beloved landscape before its own character and idiosyncrasies took shape. And while Mendelssohn’s concern over the exhibition’s conventional selection is valid, the Academy is nevertheless embracing the peculiarities of Australian art from the mid-19th century onward, albeit within the boundaries of landscape."
        },
        {
          "label": "E",
          "text": "Australia is curated by Kathleen Soriano, director of exhibitions at the Royal Academy. ‘Certainly the influence of English, French or German art is much more evident in the early periods, in the early 1800s to mid-1800s,’ she says. ‘What I wanted to show was how Australian art develops a real distinctiveness, associated with the landscape and the light.’"
        },
        {
          "label": "F",
          "text": "The fusion of ‘tradition’ of the European kind with something more specifically Australian, and often personal, is crucial to the exhibition and extends particularly to some of the more contemporary artists involved. Sydney-born video artist Shaun Gladwell is a good example of this. Gladwell’s most famous piece, which is featured in the exhibition, is Storm Sequence (2000), a video of Gladwell skateboarding on the Bondi seafront as one of Sydney’s signature brutal storms lingers offshore. It is his acknowledgment of landscape (or seascape) tradition, coloured by Gladwell’s own individualism. ‘To exhibit my work in this show might make some sense because I was interested in Turner and the idea of atmosphere affecting vision, something I was really interested in around the time of Storm Sequence. I was thinking about this tradition of Romantic landscape, but I wanted to make it personal,’ says Gladwell. But he didn’t want to just embark on borrowing imagery from elsewhere. He wanted to bring it to his experience and his world through skateboarding and beach culture."
        },
        {
          "label": "G",
          "text": "So while it may seem narrow for Britain to reduce Australian art to the genre of landscape, there can be little denying that British landscape painting is still relevant to a current generation of Australian practitioners, however indirectly."
        },
        {
          "label": "H",
          "text": "Visitors to the exhibition encounter Australian Aboriginal art first, the idea being that these works warrant a prominent position because they were ‘first’. Over the last couple of decades, London has hosted many successful exhibitions of Aboriginal art in smaller spaces, but for Soriano, Australia represents an opportunity to place such art within the context of new relationships to the art of the settlers and white Australia. ‘One of the reasons landscape was seen as being the right theme was because Australian art started in and on the landscape,’ she says. ‘[The exhibition] is a beautiful meshing of the two different kinds of art that allowed me to bring them together comfortably and honestly with this theme. It was important for me to present Indigenous art to audiences, and I felt it was most accurate to be seen as part of Australian art history, rather than a separate exhibition of its own.’"
        },
        {
          "label": "I",
          "text": "Meanwhile, Australian critic Mendelssohn also points out that London is increasingly less important to today’s generation of artists, and this somewhat weakens the ceremony surrounding the exhibition in London. ‘China is the most important art market in the world,’ she says. ‘If you’ve made it in Shanghai, you’ve made it. The world has changed. My students in Australia, who come from all over the world, really want to see Venice Biennale and Art Basel, but they’re less interested in going to London. When I was growing up, London was the destination, and then when I was at university all the smart young things wanted to go to New York,’ she added. ‘Now they want to go everywhere. There’s no such thing as the centre and the periphery like there used to be. It’s much more complicated.’"
        }
      ]
    }

function buildQuestionMap() {
  const grid = document.getElementById('q-map');
  grid.innerHTML = '';
  for (let i = 1; i <= TEACHER_DATA.meta.totalQuestions; i++) {
    const chip = document.createElement('div');
    chip.className = 'q-chip';
    chip.textContent = i;
    chip.id = `qchip-${i}`;
    chip.onclick = () => scrollToQuestion(i);
    grid.appendChild(chip);
  }
}

function scrollToQuestion(id) {
  const el = document.getElementById(`q-card-${id}`);
  if (el) {
    // Switch passage if needed
    const qData = findQuestionById(id);
    if (qData && qData.passageId !== currentPassage) {
      switchPassage(qData.passageId);
      setTimeout(() => {
        const el2 = document.getElementById(`q-card-${id}`);
        if (el2) el2.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 50);
    } else {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }
}

function findQuestionById(id) {
  for (const group of TEACHER_DATA.questions) {
    for (const item of group.items) {
      if (item.id === id) return { ...item, passageId: group.passageId };
    }
  }
  return null;
}

function updateChipState(id, state) {
  const chip = document.getElementById(`qchip-${id}`);
  if (!chip) return;
  chip.classList.remove('answered', 'checked');
  if (state) chip.classList.add(state);
}

function highlightEvidence(evidence, key) {
  if (!evidence) return '';
  const keywords = key.split(/[\s,\/]+/).filter(w => w.length > 2);
  let result = evidence;
  for (const kw of keywords) {
    const re = new RegExp(`(${kw})`, 'gi');
    result = result.replace(re, `<span class="evidence-keyword">$1</span>`);
  }
  return result;
}

/* ═══════════════════════════════════════════════════════════════
   VIEW EVIDENCE IN PASSAGE
   Finds the evidence phrase inside the passage pane, scrolls to it,
   wraps it in a temporary flash span, then removes it after 3s.
═══════════════════════════════════════════════════════════════ */
let _activeEvidenceBtn = null;
let _activeFlashSpans = [];

function viewEvidenceInPassage(btn) {
  const evidenceText = btn.dataset.evidence;
  if (!evidenceText) return;

  // Toggle off if same button clicked again
  if (_activeEvidenceBtn === btn) {
    clearEvidenceFlash();
    return;
  }

  // Clear any previous flash
  clearEvidenceFlash();

  _activeEvidenceBtn = btn;
  btn.classList.add('active');
  btn.textContent = '✕ Đang xem…';

  const passagePane = document.getElementById('passage-pane');

  // Build a clean search string (collapse whitespace)
  const searchStr = evidenceText.replace(/\s+/g, ' ').trim();

  // Use TreeWalker to find the text node(s) containing the phrase
  const result = findTextInPane(passagePane, searchStr);

  if (!result) {
    btn.textContent = '⚠ Không tìm thấy';
    btn.classList.remove('active');
    setTimeout(() => { btn.textContent = '📍 Xem trong bài'; }, 2000);
    _activeEvidenceBtn = null;
    return;
  }

  // Wrap the matched range in flash spans (may span nodes)
  const flashSpans = wrapRangeWithFlash(result);
  _activeFlashSpans = flashSpans;

  // Scroll the first span into view in the passage pane
  if (flashSpans.length > 0) {
    flashSpans[0].scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  // Auto-clear after 3.5s
  setTimeout(() => {
    if (_activeEvidenceBtn === btn) clearEvidenceFlash();
  }, 3500);
}

function clearEvidenceFlash() {
  _activeFlashSpans.forEach(span => {
    const parent = span.parentNode;
    if (!parent) return;
    while (span.firstChild) parent.insertBefore(span.firstChild, span);
    parent.removeChild(span);
    try { parent.normalize(); } catch(e) {}
  });
  _activeFlashSpans = [];

  if (_activeEvidenceBtn) {
    _activeEvidenceBtn.classList.remove('active');
    _activeEvidenceBtn.textContent = '📍 Xem trong bài';
    _activeEvidenceBtn = null;
  }
}

/**
 * Find `searchStr` across text nodes inside `container`.
 * Returns a Range covering the match, or null.
 */
function findTextInPane(container, searchStr) {
  // Concatenate all text node content with bookmarks to map back positions
  const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, null);
  const nodes = [];
  let node;
  while ((node = walker.nextNode())) nodes.push(node);

  // Build a single string from all text, track node boundaries
  let fullText = '';
  const nodeMap = []; // { node, start, end }
  for (const n of nodes) {
    const start = fullText.length;
    fullText += n.textContent;
    nodeMap.push({ node: n, start, end: fullText.length });
  }

  // Normalise whitespace in fullText for matching (but keep original nodes)
  // We search on a whitespace-collapsed shadow, mapping indices back
  const shadowText = fullText.replace(/\s+/g, ' ');
  const searchNorm = searchStr.replace(/\s+/g, ' ');

  // Build index map: shadowText[i] → fullText index
  const shadowToFull = [];
  let fi = 0;
  let prevWasSpace = false;
  for (let si = 0; si < fullText.length; si++) {
    const ch = fullText[si];
    const isSpace = /\s/.test(ch);
    if (isSpace) {
      if (!prevWasSpace) {
        shadowToFull.push(si);
        prevWasSpace = true;
      }
      // collapsed — don't push
    } else {
      shadowToFull.push(si);
      prevWasSpace = false;
    }
  }

  const matchIdx = shadowText.indexOf(searchNorm);
  if (matchIdx < 0) return null;

  const fullStart = shadowToFull[matchIdx] ?? matchIdx;
  const fullEnd   = (shadowToFull[matchIdx + searchNorm.length - 1] ?? (matchIdx + searchNorm.length - 1)) + 1;

  // Map fullText positions back to DOM nodes
  function nodeAtPos(pos) {
    for (const nm of nodeMap) {
      if (pos >= nm.start && pos < nm.end) {
        return { node: nm.node, offset: pos - nm.start };
      }
    }
    // edge case: end of last node
    const last = nodeMap[nodeMap.length - 1];
    return { node: last.node, offset: last.node.textContent.length };
  }

  const startInfo = nodeAtPos(fullStart);
  const endInfo   = nodeAtPos(fullEnd);

  const range = document.createRange();
  range.setStart(startInfo.node, startInfo.offset);
  range.setEnd(endInfo.node, endInfo.offset);
  return range;
}

/**
 * Wrap a Range (possibly multi-node) with <span class="evidence-flash"> elements.
 * Returns array of spans created.
 */
function wrapRangeWithFlash(range) {
  const passagePane = document.getElementById('passage-pane');
  const walker = document.createTreeWalker(
    range.commonAncestorContainer.nodeType === Node.TEXT_NODE
      ? range.commonAncestorContainer.parentNode
      : range.commonAncestorContainer,
    NodeFilter.SHOW_TEXT,
    null
  );

  const nodes = [];
  let node;
  while ((node = walker.nextNode())) {
    if (!passagePane.contains(node)) continue;
    if (!range.intersectsNode(node)) continue;
    nodes.push(node);
  }

  const spans = [];
  nodes.forEach(textNode => {
    let start = 0;
    let end = textNode.length;
    if (textNode === range.startContainer) start = range.startOffset;
    if (textNode === range.endContainer)   end   = range.endOffset;
    if (start >= end) return;

    const before = textNode.splitText(start);
    before.splitText(end - start);

    const span = document.createElement('span');
    span.className = 'evidence-flash';
    before.parentNode.insertBefore(span, before);
    span.appendChild(before);
    spans.push(span);
  });

  return spans;
}

function switchPassage(idx) {
  currentPassage = idx;

  // Update tabs
  document.querySelectorAll('.passage-tab').forEach((t, i) => {
    t.classList.toggle('active', i === idx);
  });

  renderPassage(idx);
  renderQuestions(idx);

  // Scroll both panes to top
  document.getElementById('passage-pane').scrollTop = 0;
  document.getElementById('questions-pane').scrollTop = 0;
}

function updateInputFeedback(qId, isCorrect) {
  const input = document.getElementById(`teacher-input-${qId}`);
  if (!input) return;
  input.classList.remove('is-correct', 'is-wrong');
  if (input.value.trim() === '') return;
  input.classList.add(isCorrect ? 'is-correct' : 'is-wrong');
}

/* ═══════════════════════════════════════════════════════════════
   CHECK ANSWER
═══════════════════════════════════════════════════════════════ */
function checkAnswer(qId) {
  const panel = document.getElementById(`correction-${qId}`);
  if (!panel) return;

  panel.classList.add('open');
  checkedQuestions[qId] = true;
  updateChipState(qId, 'checked');

  // Determine correctness for report
  const qData = findQuestionById(qId);
  if (qData) {
    let studentAnswer = '';
    let isCorrect = false;

    const card = document.getElementById(`q-card-${qId}`);
    const select = document.getElementById(`teacher-select-${qId}`);
    const binary = card ? card.querySelector('.binary-choice.selected') : null;
    if (qData.options) {
      const selected = card ? card.querySelector('.q-option.selected') : null;
      studentAnswer = selected ? selected.dataset.selected : '';
      isCorrect = studentAnswer.toUpperCase() === qData.key.toUpperCase();
    } else if (select) {
      studentAnswer = select.value;
      isCorrect = studentAnswer.toUpperCase() === qData.key.toUpperCase();
    } else if (binary) {
      studentAnswer = binary.dataset.value;
      isCorrect = studentAnswer.toUpperCase() === qData.key.toUpperCase();
    } else {
      const input = document.getElementById(`teacher-input-${qId}`);
      studentAnswer = input ? input.value.trim() : '';
      const norm = s => s.toLowerCase().replace(/[^a-z0-9\s]/g,'').trim();
      isCorrect = norm(studentAnswer) === norm(qData.key) ||
        (qData.key.includes('/') && qData.key.split('/').some(k => norm(k) === norm(studentAnswer)));
    }

    registerStudentAnswer(qId, studentAnswer, isCorrect);
    updateInputFeedback(qId, isCorrect);
  }

  if (document.getElementById(`completion-chip-${qId}`)) return;

  setTimeout(() => {
    panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 50);
}

/* ═══════════════════════════════════════════════════════════════
   ALL KEYS TABLE
═══════════════════════════════════════════════════════════════ */
function buildAllKeysTable() {
  const table = document.getElementById('key-table-body');
  let html = '';
  for (const group of TEACHER_DATA.questions) {
    for (const item of group.items) {
      html += `<tr>
        <td class="kt-num">${item.id}</td>
        <td class="kt-key">${item.key}</td>
        <td class="kt-type">${group.type.split(' ').slice(0,2).join(' ')}</td>
      </tr>`;
    }
  }
  table.innerHTML = html;
}

function toggleAllKeys(show) {
  document.getElementById('all-keys-panel').classList.toggle('open', show);
}

/* ═══════════════════════════════════════════════════════════════
   HIGHLIGHT TOOL — robust multi-node, cursor-anchored, click-to-remove
═══════════════════════════════════════════════════════════════ */
let _hlMouseX = 0;
let _hlMouseY = 0;
let _pendingRange = null;

function setupHighlightTool() {
  const toolbar = document.getElementById('hl-toolbar');
  const passagePane = document.getElementById('passage-pane');

  // Track mouse position at all times for accurate toolbar placement
  document.addEventListener('mousemove', (e) => {
    _hlMouseX = e.clientX;
    _hlMouseY = e.clientY;
  });

  // Click on an existing highlight → remove it
  passagePane.addEventListener('click', (e) => {
    const mark = e.target.closest('mark.hl-yellow');
    if (mark) {
      removeHighlight(mark);
      e.stopPropagation();
      return;
    }
  });

  // After mouseup: check if there's a real selection inside the passage
  document.addEventListener('mouseup', (e) => {
    // Ignore clicks inside the toolbar itself
    if (toolbar.contains(e.target)) return;

    // Small delay so selection is settled
    setTimeout(() => {
      const sel = window.getSelection();

      if (!sel || sel.isCollapsed || sel.toString().trim() === '') {
        hideToolbar();
        return;
      }

      // Verify selection is inside the passage pane
      const range = sel.getRangeAt(0);
      if (!passagePane.contains(range.commonAncestorContainer)) {
        hideToolbar();
        return;
      }

      // Store the range for later use when button is clicked
      _pendingRange = range.cloneRange();

      // Position toolbar above where the mouse is
      showToolbarAt(_hlMouseX, _hlMouseY - 52);
    }, 10);
  });

  // Hide toolbar on mousedown outside
  document.addEventListener('mousedown', (e) => {
    if (!toolbar.contains(e.target)) {
      hideToolbar();
    }
  });

  // Hide on scroll (re-anchoring is complex; just hide)
  document.getElementById('passage-pane').addEventListener('scroll', () => {
    hideToolbar();
  });
}

function showToolbarAt(x, y) {
  const toolbar = document.getElementById('hl-toolbar');
  // Clamp so toolbar doesn't go off-screen
  const tw = 130; // approx toolbar width
  const clampedX = Math.min(Math.max(x, tw / 2 + 8), window.innerWidth - tw / 2 - 8);
  const clampedY = Math.max(y, 8);
  toolbar.style.left = `${clampedX}px`;
  toolbar.style.top = `${clampedY}px`;
  toolbar.classList.add('visible');
}

function hideToolbar() {
  document.getElementById('hl-toolbar').classList.remove('visible');
}

function applyHighlight() {
  const sel = window.getSelection();
  const range = (_pendingRange && !_pendingRange.collapsed)
    ? _pendingRange
    : (sel && !sel.isCollapsed ? sel.getRangeAt(0) : null);

  if (!range) { hideToolbar(); return; }

  // Use TreeWalker to split across text nodes safely — no broken DOM
  highlightRange(range);

  // Clear selection
  if (sel) sel.removeAllRanges();
  _pendingRange = null;
  hideToolbar();
}

/**
 * Highlight a Range that may span multiple text nodes / block elements.
 * Strategy: collect all text nodes within the range, wrap each one
 * individually in a <mark>. This avoids the surroundContents() constraint
 * that the range must not partially select an element, and keeps
 * inline flow intact so text never breaks unexpectedly.
 */
function highlightRange(range) {
  const passagePane = document.getElementById('passage-pane');

  // Collect all text nodes touched by the range
  const walker = document.createTreeWalker(
    range.commonAncestorContainer.nodeType === Node.TEXT_NODE
      ? range.commonAncestorContainer.parentNode
      : range.commonAncestorContainer,
    NodeFilter.SHOW_TEXT,
    null
  );

  const nodes = [];
  let node;
  while ((node = walker.nextNode())) {
    // Only include nodes inside the passage pane
    if (!passagePane.contains(node)) continue;
    if (!range.intersectsNode(node)) continue;
    nodes.push(node);
  }

  nodes.forEach((textNode) => {
    // Determine which portion of this text node is selected
    let start = 0;
    let end = textNode.length;

    if (textNode === range.startContainer) start = range.startOffset;
    if (textNode === range.endContainer) end = range.endOffset;

    if (start >= end) return; // nothing to highlight here

    // Split and wrap only the selected slice
    // splitText returns the tail; we need to be careful about order
    const before = textNode.splitText(start);       // before = [start..end]
    const after  = before.splitText(end - start);   // after = [end..]  (unused but needed)

    const mark = document.createElement('mark');
    mark.className = 'hl-yellow';
    before.parentNode.insertBefore(mark, before);
    mark.appendChild(before);
    highlights.push(mark);
  });

  // Normalize to clean up any adjacent text nodes we created
  // but only where it's safe (not inside inputs)
  try {
    const ancestor = range.commonAncestorContainer.nodeType === Node.TEXT_NODE
      ? range.commonAncestorContainer.parentNode
      : range.commonAncestorContainer;
    ancestor.normalize && ancestor.normalize();
  } catch(e) { /* ignore */ }
}

function removeHighlight(mark) {
  // Unwrap the mark: move all children before the mark, then remove mark
  const parent = mark.parentNode;
  if (!parent) return;
  while (mark.firstChild) {
    parent.insertBefore(mark.firstChild, mark);
  }
  parent.removeChild(mark);
  parent.normalize();
  // Remove from highlights array
  const idx = highlights.indexOf(mark);
  if (idx > -1) highlights.splice(idx, 1);
}

function clearAllHighlights() {
  // Work on a copy since removeHighlight mutates the array
  [...highlights].forEach(mark => removeHighlight(mark));
  highlights = [];
}

/* ═══════════════════════════════════════════════════════════════
   RESIZABLE SPLITTER
═══════════════════════════════════════════════════════════════ */
function setupSplitter() {
  const splitter = document.getElementById('splitter');
  const passagePane = document.getElementById('passage-pane');
  const splitContainer = document.getElementById('split-container');

  let isDragging = false;
  let startX = 0;
  let startWidth = 0;

  splitter.addEventListener('mousedown', (e) => {
    isDragging = true;
    startX = e.clientX;
    startWidth = passagePane.offsetWidth;
    splitter.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    const dx = e.clientX - startX;
    const containerW = splitContainer.offsetWidth;
    const newW = Math.min(Math.max(startWidth + dx, 280), containerW - 280);
    passagePane.style.width = newW + 'px';
  });

  document.addEventListener('mouseup', () => {
    if (!isDragging) return;
    isDragging = false;
    splitter.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
}

/* ═══════════════════════════════════════════════════════════════
   TIPS PANEL
═══════════════════════════════════════════════════════════════ */
function openTipsPanel(qType) {
  const panel = document.getElementById('tips-panel');
  const title = document.getElementById('tips-panel-title');
  const body  = document.getElementById('tips-panel-body');

  // Find matching tips — try exact match, then partial
  let data = TIPS_DATA[qType];
  if (!data) {
    const key = Object.keys(TIPS_DATA).find(k => qType.toLowerCase().includes(k.toLowerCase().split(' ')[0]));
    data = key ? TIPS_DATA[key] : null;
  }

  if (!data) {
    body.innerHTML = `<div style="color:var(--ink-muted);padding:20px;font-size:13px;">Chưa có tips cho dạng bài này.</div>`;
  } else {
    title.textContent = qType;

    const stepsHtml = data.steps.map((s, i) => `
      <div class="tips-item">
        <div class="tips-item-num">${i + 1}</div>
        <div class="tips-item-text"><strong>${s.title}:</strong> ${s.text}</div>
      </div>`).join('');

    const trapsHtml = data.traps.map(t => `
      <div class="tips-trap">
        <span class="tips-trap-icon">⚠️</span>
        <span>${t}</span>
      </div>`).join('');

    const bandHtml = data.bandTips.map(b => `
      <div class="tips-band">
        <span class="tips-band-icon">🚀</span>
        <span>${b}</span>
      </div>`).join('');

    body.innerHTML = `
      <div class="tips-overview">${data.overview}</div>

      <div class="tips-section">
        <div class="tips-section-title">📋 Quy trình làm bài</div>
        ${stepsHtml}
      </div>

      <div class="tips-section">
        <div class="tips-section-title">⚠️ Bẫy thường gặp</div>
        ${trapsHtml}
      </div>

      <div class="tips-section">
        <div class="tips-section-title">🚀 Tips tăng Band</div>
        ${bandHtml}
      </div>`;
  }

  panel.classList.add('open');
}

function closeTipsPanel() {
  document.getElementById('tips-panel').classList.remove('open');
}

/* ═══════════════════════════════════════════════════════════════
   SIDEBAR NAV SWITCH (Câu hỏi ↔ Báo cáo)
═══════════════════════════════════════════════════════════════ */
function switchSidebarView(view) {
  const isQ = view === 'questions';
  const qView = document.getElementById('sidebar-view-questions');
  const rView = document.getElementById('sidebar-view-report');
  qView.classList.toggle('hidden', !isQ);
  rView.classList.toggle('visible', !isQ);
  document.getElementById('snav-questions').classList.toggle('active', isQ);
  document.getElementById('snav-report').classList.toggle('active', !isQ);
  if (!isQ) buildReport();
}

/* ═══════════════════════════════════════════════════════════════
   REPORT BUILDER
═══════════════════════════════════════════════════════════════ */
// Track student answers: { qId: { studentAnswer, isCorrect } }
const studentAnswers = {};

// Call after each checkAnswer to register
function registerStudentAnswer(qId, studentAnswer, isCorrect) {
  studentAnswers[qId] = { studentAnswer, isCorrect };
  const chip = document.getElementById(`completion-chip-${qId}`);
  if (chip) chip.classList.add('checked');
}

function buildReport() {
  const hint    = document.getElementById('report-hint');
  const content = document.getElementById('report-content');
  const totalChecked = Object.keys(studentAnswers).length;

  if (totalChecked === 0) {
    hint.style.display = 'flex';
    content.classList.remove('visible');
    return;
  }

  hint.style.display = 'none';
  content.classList.add('visible');

  // Group results by question type
  const byType = {}; // { typeName: { total, wrong, items: [{id, isCorrect}] } }

  for (const group of TEACHER_DATA.questions) {
    const type = group.type;
    if (!byType[type]) byType[type] = { total: 0, wrong: 0, items: [] };
    for (const item of group.items) {
      if (studentAnswers[item.id] !== undefined) {
        byType[type].total++;
        const correct = studentAnswers[item.id].isCorrect;
        if (!correct) byType[type].wrong++;
        byType[type].items.push({ id: item.id, isCorrect: correct });
      }
    }
  }

  // Build weakness list
  const weakTypes = Object.entries(byType)
    .filter(([, v]) => v.total > 0 && v.wrong > 0)
    .sort((a, b) => (b[1].wrong / b[1].total) - (a[1].wrong / a[1].total));

  let html = '';

  // Summary per type
  for (const [type, data] of Object.entries(byType)) {
    if (data.total === 0) continue;
    const correct = data.total - data.wrong;
    const pct = Math.round((correct / data.total) * 100);
    const scoreClass = pct >= 80 ? 'good' : pct >= 50 ? 'mid' : 'bad';
    const shortType = type.split(' ').slice(0, 3).join(' ');

    const qRows = data.items.map(item => {
      const icon = item.isCorrect ? '✅' : '❌';
      const diag = item.isCorrect ? '' : getDiagnosis(item.id);
      return `<div class="report-q-row">
        <span class="rq-num">${item.id}</span>
        <span class="rq-status">${icon}</span>
        <span class="rq-diag">${diag}</span>
      </div>`;
    }).join('');

    html += `<div class="report-group-card">
      <div class="report-group-head">
        <span class="report-group-name">${shortType}</span>
        <span class="report-group-score ${scoreClass}">${correct}/${data.total} · ${pct}%</span>
      </div>
      <div class="report-q-list">${qRows}</div>
    </div>`;
  }

  // Focus areas for student
  if (weakTypes.length > 0) {
    const focusItems = weakTypes.slice(0, 3).map(([type, data]) => {
      const pct = Math.round(((data.total - data.wrong) / data.total) * 100);
      const shortT = type.split(' ').slice(0,3).join(' ');
      return `<div class="report-focus-item">
        <div class="report-focus-dot"></div>
        <div><strong>${shortT}</strong>: ${pct}% chính xác — cần ôn lại quy trình và bẫy thường gặp</div>
      </div>`;
    }).join('');

    html += `<div class="report-summary-box">
      <div class="report-summary-title">🎯 Học sinh cần tập trung</div>
      ${focusItems}
    </div>`;
  } else if (totalChecked > 0) {
    html += `<div class="report-summary-box">
      <div class="report-summary-title">🎉 Kết quả tốt!</div>
      <div class="report-focus-item"><div class="report-focus-dot"></div><div>Học sinh làm tốt tất cả dạng bài đã check.</div></div>
    </div>`;
  }

  content.innerHTML = html;
}

function getDiagnosis(qId) {
  // Find which question type this belongs to
  for (const group of TEACHER_DATA.questions) {
    for (const item of group.items) {
      if (item.id === qId) {
        const type = group.type;
        if (type.includes('TRUE') || type.includes('FALSE')) return 'Nhầm FALSE/NOT GIVEN';
        if (type.includes('Multiple')) return 'Chọn distractor';
        if (type.includes('Short')) return 'Sai từ / vượt giới hạn';
        if (type.includes('Heading')) return 'Nhầm ý chính';
        if (type.includes('Matching')) return 'Locate sai đoạn';
        if (type.includes('Summary')) return 'Sai từ / paraphrase';
        return 'Cần xem lại';
      }
    }
  }
  return '';
}
